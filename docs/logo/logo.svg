<?xml version="1.0" encoding="UTF-8"?>
<svg
        xmlns="http://www.w3.org/2000/svg"
        width="521"
        height="489"
        viewBox="0 0 521 489"
>

    <!-- Background -->
    <rect
            width="521"
            height="489"
            rx="24"
            fill="#f5f5f5"
    />

    <!-- Code Icon -->
    <g
            id="code-icon"
            font-family="monospace"
            font-size="72"
            font-weight="700"
            fill="#1d2b53"
            text-anchor="middle"
    >
        <text x="260.5" y="180">&lt;/&gt;</text>
    </g>

    <!-- Logo Text -->
    <g
            id="logo-text"
            font-family="Inter, Arial, sans-serif"
            font-size="64"
            font-weight="700"
            text-anchor="middle"
    >
        <text x="260.5" y="320">
            <tspan fill="#d19a00">Turbo</tspan><tspan fill="#24345d">Http</tspan>
        </text>
    </g>

</svg>